&lt;!-- ========== OP2-1 ========== --&gt;
&lt;div class=&quot;talk&quot; id=&quot;op2-1&quot;&gt;
  &lt;div class=&quot;talk-tag&quot;&gt;▎ OP2-1 · Phenomenological Study&lt;/div&gt;
  &lt;h2&gt;Role Adaptation and Professional Meaning-Making of ICU Advanced Practice Nurses During Korea's Healthcare Workforce Crisis&lt;/h2&gt;
  &lt;div class=&quot;subtitle&quot;&gt;한국 의료인력 위기 중 중환자실 전문간호사의 역할 적응과 전문직 의미 형성에 관한 현상학적 연구&lt;/div&gt;
  &lt;div class=&quot;author-block&quot;&gt;
    &lt;strong&gt;발표자:&lt;/strong&gt; Eun Sook Kim (김은숙) · &lt;strong&gt;공저자:&lt;/strong&gt; Su Jung Choi (최수정)&lt;br&gt;
    &lt;strong&gt;소속:&lt;/strong&gt; Intensive Care Unit Advanced Practice Nursing Team, Samsung Medical Center, Korea&lt;br&gt;
    Graduate School of Clinical Nursing Science, Sungkyunkwan University, Korea
  &lt;/div&gt;

  &lt;div class=&quot;summary&quot;&gt;
    &lt;h3&gt;⬛ Three Key Take-Home Messages&lt;/h3&gt;
    &lt;div class=&quot;summary-grid&quot;&gt;
      &lt;div class=&quot;summary-item&quot;&gt;
        &lt;div class=&quot;summary-num&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;summary-label&quot;&gt;구조적 공백 속 적응&lt;/div&gt;
        &lt;div class=&quot;summary-val&quot;&gt;명확한 역할·평가 체계 부재 상태에서의 능동적 정체성 구성&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;summary-item&quot;&gt;
        &lt;div class=&quot;summary-num&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;summary-label&quot;&gt;자율성 = 지속의 핵심&lt;/div&gt;
        &lt;div class=&quot;summary-val&quot;&gt;확장된 임상 자율성·지적 참여가 직업적 성취감의 원천&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;summary-item&quot;&gt;
        &lt;div class=&quot;summary-num&quot;&gt;3&lt;/div&gt;
        &lt;div class=&quot;summary-label&quot;&gt;개인 → 구조 전환 필요&lt;/div&gt;
        &lt;div class=&quot;summary-val&quot;&gt;개인 회복탄력성 의존 모델 → 제도화·평가체계 정비 요구&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Background — 연구 배경&lt;/h3&gt;
    &lt;p&gt;2024년 한국 &lt;strong&gt;의료인력 위기(전공의 사직 사태)&lt;/strong&gt; 이후, 중환자실(ICU)에 새롭게 배치된 전문간호사(Advanced Practice Nurses, APN)들은 의사 부족을 보완하고 중환자 케어의 연속성을 유지하는 역할을 맡게 되었다. 이들은 &lt;strong&gt;일차 호출 응대, 약물 조정, 침습적 시술&lt;/strong&gt; 등 확장된 책임을 수행했으나, 명확한 제도적 프레임워크는 부재한 상태였다.&lt;/p&gt;
    &lt;p&gt;이러한 급변하는 역할이 ICU 시스템 안정성과 직결되는 만큼, 본 연구는 신규 ICU APN의 역할 적응 경험을 탐색하고 그 적응의 본질적 의미를 규명하고자 했다.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Methods — 연구 방법&lt;/h3&gt;
    &lt;ul&gt;
      &lt;li&gt;&lt;strong&gt;설계:&lt;/strong&gt; Colaizzi의 현상학적 질적 연구 방법&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;참가자:&lt;/strong&gt; 서울 소재 상급종합병원 ICU APN 11명 (APN 경력 6–24개월)&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;자료 수집:&lt;/strong&gt; 심층 개별 인터뷰 (2025.11 ~ 2026.2)&lt;/li&gt;
      &lt;li&gt;&lt;strong&gt;분석:&lt;/strong&gt; Colaizzi 7단계 절차 (의미 단위 도출 → 형식 진술 → 주제·주제군 형성 → 본질 구조 기술)&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Results — 6 Themes / 13 Subthemes&lt;/h3&gt;
    &lt;div class=&quot;theme-list&quot;&gt;
      &lt;div class=&quot;theme&quot;&gt;
        &lt;div class=&quot;theme-num&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;구조화되지 않은 세계에서의 '되어감(Becoming)'&lt;/strong&gt;
          &lt;p&gt;외부 표준 부재 속에서 스스로 역할과 전문직 정체성을 정의 — 적응은 완료가 아닌 지속적 과정&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot;&gt;
        &lt;div class=&quot;theme-num&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;수행을 통한 정당성 입증 (Legitimacy through Performance)&lt;/strong&gt;
          &lt;p&gt;APN 역할의 정당성이 개인의 수행 능력에 과도하게 의존 — 미래 역할 지속가능성에 대한 압박&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot;&gt;
        &lt;div class=&quot;theme-num&quot;&gt;3&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;경계 그리기 (Drawing Boundaries)&lt;/strong&gt;
          &lt;p&gt;명확한 프로토콜·가이드라인 부재 상태에서 임상적 판단 영역을 스스로 설정·평가하며 결과에 대한 책임을 부담&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot;&gt;
        &lt;div class=&quot;theme-num&quot;&gt;4&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;가시성과 전문성 사이의 긴장&lt;/strong&gt;
          &lt;p&gt;총체적 환자 중심 케어를 제공하나, 그 기여가 성과 중심 조직 평가체계에서 가시화되기 어려운 지속적 긴장&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot;&gt;
        &lt;div class=&quot;theme-num&quot;&gt;5&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;경험·성취·확장된 자율성을 통한 역할 지속&lt;/strong&gt;
          &lt;p&gt;책임감과 불확실성에도 불구하고, 더 큰 자율성과 환자 케어 참여를 통해 강한 성취감 — 자율성을 통한 역량 획득이 역할 유지의 핵심&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot;&gt;
        &lt;div class=&quot;theme-num&quot;&gt;6&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;안정성 부재 속 의미 구성 (Constructing Meaning)&lt;/strong&gt;
          &lt;p&gt;전통적 안정성·외부 표준이 부재한 환경을 수동적으로 수용하지 않고, 능동적으로 경험을 재구성하여 자체 실천 기준을 개발 → 확장된 전문직 정체성&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Discussion — 핵심 통찰&lt;/h3&gt;
    &lt;p&gt;전통적으로 의사·간호사는 &lt;strong&gt;이미 확립된 시스템&lt;/strong&gt; 안에서 적응했다. 반면 본 연구의 APN은 &lt;strong&gt;불명확하고 취약하며 제도적 지원이 제한적인&lt;/strong&gt; 환경에서, 단순한 적응이 아닌 &lt;strong&gt;역할 자체를 능동적으로 구성&lt;/strong&gt;해야 했다.&lt;/p&gt;
    &lt;p&gt;참가자들은 가시화되지 않는 기여를 입증해야 한다는 압박 속에서도 정체성을 발전시켰고, 높은 자율성과 지속적 불확실성을 동시에 경험했다. APN 적응은 &lt;strong&gt;단순한 역량 획득이 아니라, 역할 자체가 지속적으로 형성되는 동적 과정&lt;/strong&gt;이다.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;conclusion&quot;&gt;
    &lt;div class=&quot;conclusion-label&quot;&gt;Conclusion&lt;/div&gt;
    &lt;p&gt;신규 ICU APN은 의료시스템 붕괴기에 &lt;strong&gt;핵심 안정화 동력(stabilizing agents)&lt;/strong&gt;으로 기능했다. 이들의 적응에는 구조적 도전과 강한 전문직 몰입이 모두 반영되어 있다.&lt;br&gt;&lt;br&gt;지속가능한 ICU 안정화를 위해 APN 역할은 &lt;strong&gt;① 명확하게 제도화&lt;/strong&gt;되어야 하며, &lt;strong&gt;② 의사결정 프레임워크&lt;/strong&gt;로 뒷받침되고, &lt;strong&gt;③ 중환자 케어 결과를 반영하는 의미 있는 성과 지표&lt;/strong&gt;와 정렬되어야 한다. 핵심 메시지: &lt;strong&gt;&quot;개인적 부담에서 구조적 지원으로의 전환(from individual heritage to structural support).&quot;&lt;/strong&gt;&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa&quot;&gt;
    &lt;div class=&quot;qa-head&quot;&gt;▎ Q&amp;A · Floor Discussion&lt;/div&gt;
    &lt;div class=&quot;qa-body&quot;&gt;
      &lt;div class=&quot;qa-item&quot;&gt;
        &lt;div class=&quot;qa-q&quot;&gt;&lt;span&gt;전공의 복귀 후, 향후 APN과 전공의 간 업무 분담은 어떻게 이루어질 것으로 보는가?&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;qa-a&quot;&gt;&lt;span&gt;현재 APN과 전공의 간 역할에 큰 차이를 두지 않는 분위기. 일부 시술(procedure)은 APN에게 부담이 되어 별도 교육 시스템을 마련 중이며, APN과 전공의가 함께 수행할 수 있는 체계로 운영되고 있다.&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;


&lt;/section&gt;&lt;!-- end part-1 --&gt;

&lt;section class=&quot;part-panel&quot; id=&quot;part-2&quot;&gt;

&lt;!-- ========== OP2-4 ========== --&gt;
&lt;div class=&quot;talk&quot; id=&quot;op2-4&quot;&gt;
  &lt;div class=&quot;talk-tag teal&quot;&gt;▎ OP2-4 · Quality Improvement&lt;/div&gt;
  &lt;h2&gt;Impact of Department-specific In-situ Mock Cardiac Arrest Simulation on Emergency Response Competency&lt;/h2&gt;
  &lt;div class=&quot;subtitle&quot;&gt;부서 특화 현장(In-situ) 모의 심정지 시뮬레이션이 응급대응 역량에 미치는 영향 — 3년 QI 프로젝트&lt;/div&gt;
  &lt;div class=&quot;author-block&quot;&gt;
    &lt;strong&gt;발표자:&lt;/strong&gt; Sulhee Kim (김설희) · &lt;strong&gt;공저자:&lt;/strong&gt; Sang Hoon Na, Eunhye Kim, Sang Min Lee&lt;br&gt;
    &lt;strong&gt;소속:&lt;/strong&gt; Rapid Response Team, Seoul National University Hospital&lt;br&gt;
    Internal Medicine, SNU College of Medicine · AHA ACLS Training Site Director, SNUH&lt;br&gt;
    Nursing, SNUH · Critical Care Medicine, SNUH
  &lt;/div&gt;

  &lt;div class=&quot;summary teal&quot;&gt;
    &lt;h3&gt;⬛ Three Key Take-Home Messages&lt;/h3&gt;
    &lt;div class=&quot;summary-grid&quot;&gt;
      &lt;div class=&quot;summary-item&quot;&gt;
        &lt;div class=&quot;summary-num&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;summary-label&quot;&gt;현장 시뮬레이션의 힘&lt;/div&gt;
        &lt;div class=&quot;summary-val&quot;&gt;강의실이 아닌 &lt;strong&gt;실제 임상 공간에서&lt;/strong&gt; 부서별 시나리오로 시행&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;summary-item&quot;&gt;
        &lt;div class=&quot;summary-num&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;summary-label&quot;&gt;시스템 표준화 동시 진행&lt;/div&gt;
        &lt;div class=&quot;summary-val&quot;&gt;2022년 병원 전체 &lt;strong&gt;E-cart 표준화&lt;/strong&gt; (라벨·레이아웃·체크리스트)&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;summary-item&quot;&gt;
        &lt;div class=&quot;summary-num&quot;&gt;3&lt;/div&gt;
        &lt;div class=&quot;summary-label&quot;&gt;파일럿 → 정규 프로그램&lt;/div&gt;
        &lt;div class=&quot;summary-val&quot;&gt;2025년부터 SNUH &lt;strong&gt;공식 정규 CPR 교육&lt;/strong&gt;으로 채택&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Background — 연구 배경&lt;/h3&gt;
    &lt;p&gt;심정지의 &lt;strong&gt;조기 인지와 협응적 팀 대응&lt;/strong&gt;은 효과적인 심폐소생술(CPR)의 핵심이다. CPR 교육은 광범위하게 시행되고 있으나, 다수의 프로그램이 &lt;strong&gt;실제 임상 환경과 다른 강의실 환경&lt;/strong&gt;에서 진행되어 현장 적용성에 한계가 있었다.&lt;/p&gt;
    &lt;p&gt;&lt;strong&gt;현장(In-situ) 시뮬레이션&lt;/strong&gt;은 실제 근무 공간에서 시행되어 개인 역량과 팀 기반 대응을 동시에 향상시킬 수 있는 효과적 전략으로 제시된다. 본 연구는 부서 특화 현장 모의 심정지 시뮬레이션이 의료진의 응급대응 역량을 향상시키는지 평가했다.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Methods — QI 3단계 프로세스&lt;/h3&gt;
    &lt;p&gt;&lt;strong&gt;대상기관:&lt;/strong&gt; 서울대학교병원 (1,385병상 상급종합병원) · &lt;strong&gt;기간:&lt;/strong&gt; 2021–2023&lt;/p&gt;
    &lt;div class=&quot;theme-list&quot;&gt;
      &lt;div class=&quot;theme&quot; style=&quot;border-left-color: var(--teal);&quot;&gt;
        &lt;div class=&quot;theme-num&quot; style=&quot;background: var(--teal);&quot;&gt;1&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;Preparation — 준비 단계&lt;/strong&gt;
          &lt;p&gt;부서별 응급대응 프로토콜 개발. 각 부서가 &lt;strong&gt;자체 고위험 사례&lt;/strong&gt;를 기반으로 시나리오를 직접 작성 → 참여 극대화&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot; style=&quot;border-left-color: var(--teal);&quot;&gt;
        &lt;div class=&quot;theme-num&quot; style=&quot;background: var(--teal);&quot;&gt;2&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;Execution — 실행 단계&lt;/strong&gt;
          &lt;p&gt;임상 현장에서 baseline 시뮬레이션 → debriefing → 즉시 재시뮬레이션 (2회차) 시행&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;theme&quot; style=&quot;border-left-color: var(--teal);&quot;&gt;
        &lt;div class=&quot;theme-num&quot; style=&quot;background: var(--teal);&quot;&gt;3&lt;/div&gt;
        &lt;div class=&quot;theme-text&quot;&gt;
          &lt;strong&gt;System Optimization — 시스템 최적화&lt;/strong&gt;
          &lt;p&gt;식별된 시스템 오류·안전 위협을 즉시 개선 → &lt;strong&gt;2022년 병원 전체 E-cart 표준화 프로젝트&lt;/strong&gt; 시행 (실링 통일, 외부 라벨, 레이아웃, 체크리스트 표준화)&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;p style=&quot;font-size:14px; margin-top:10px;&quot;&gt;&lt;strong&gt;총 47회 시뮬레이션 세션&lt;/strong&gt;이 다양한 임상 부서에서 시행됨. 사전·사후 5점 Likert 척도 설문(자신감·임상 수행능력·팀 역할 인식·CPR 순서 이해 4개 도메인) 비교.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;section&quot;&gt;
    &lt;h3&gt;Results — 주요 결과&lt;/h3&gt;
    &lt;p&gt;&lt;strong&gt;① 주관적 역량 평가 (5점 Likert · 사전 159명 / 사후 171명)&lt;/strong&gt;&lt;/p&gt;
    &lt;table class=&quot;result-table&quot;&gt;
      &lt;thead&gt;
        &lt;tr&gt;
          &lt;th&gt;도메인&lt;/th&gt;
          &lt;th&gt;사전 (Pre)&lt;/th&gt;
          &lt;th&gt;사후 (Post)&lt;/th&gt;
          &lt;th&gt;변화&lt;/th&gt;
          &lt;th&gt;유의성&lt;/th&gt;
        &lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;
          &lt;td&gt;응급대응 자신감 (Confidence)&lt;/td&gt;
          &lt;td&gt;3.48&lt;/td&gt;
          &lt;td&gt;4.34&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;+0.86&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;pval&quot;&gt;p &amp;lt; 0.001&lt;/span&gt;&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;임상 수행능력 (Execution)&lt;/td&gt;
          &lt;td&gt;3.63&lt;/td&gt;
          &lt;td&gt;4.47&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;+0.84&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;pval&quot;&gt;p &amp;lt; 0.001&lt;/span&gt;&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;팀 역할 인식 (Team Role)&lt;/td&gt;
          &lt;td&gt;3.71&lt;/td&gt;
          &lt;td&gt;4.47&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;+0.76&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;pval&quot;&gt;p &amp;lt; 0.001&lt;/span&gt;&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;CPR 순서 이해 (Sequence)&lt;/td&gt;
          &lt;td&gt;3.62&lt;/td&gt;
          &lt;td&gt;4.36&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;+0.74&lt;/td&gt;
          &lt;td&gt;&lt;span class=&quot;pval&quot;&gt;p &amp;lt; 0.001&lt;/span&gt;&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;

    &lt;p style=&quot;margin-top:18px;&quot;&gt;&lt;strong&gt;② 객관적 수행시간 단축 (강의 본문 발표)&lt;/strong&gt;&lt;/p&gt;
    &lt;table class=&quot;result-table&quot;&gt;
      &lt;thead&gt;
        &lt;tr&gt;
          &lt;th&gt;지표&lt;/th&gt;
          &lt;th&gt;사전&lt;/th&gt;
          &lt;th&gt;사후&lt;/th&gt;
          &lt;th&gt;개선&lt;/th&gt;
        &lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;
          &lt;td&gt;첫 흉부압박 시작 (Time to First Compression)&lt;/td&gt;
          &lt;td&gt;23.8 초&lt;/td&gt;
          &lt;td&gt;17.7 초&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;−6.1초 단축&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;첫 제세동 (Time to First Shock)&lt;/td&gt;
          &lt;td&gt;52.7 초&lt;/td&gt;
          &lt;td&gt;37.2 초&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;−15.5초 단축&lt;/td&gt;
        &lt;/tr&gt;
        &lt;tr&gt;
          &lt;td&gt;&lt;strong&gt;3분 이내 제세동 성공률&lt;/strong&gt;&lt;/td&gt;
          &lt;td&gt;43%&lt;/td&gt;
          &lt;td&gt;86%&lt;/td&gt;
          &lt;td class=&quot;delta&quot;&gt;2배 ↑&lt;/td&gt;
        &lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;

    &lt;div class=&quot;callout&quot;&gt;
      &lt;div class=&quot;callout-title&quot;&gt;⚠ 참가자 구성 — Multidisciplinary&lt;/div&gt;
      &lt;p&gt;총 171명 참여 / &lt;strong&gt;65% 이상이 임상경력 10년 이상&lt;/strong&gt;의 다학제 인력. 간호사 중심이지만 &lt;strong&gt;의사 및 보조 인력의 능동적 참여&lt;/strong&gt;로 시스템 분석에 견고한 다학제 기반 확보.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;callout&quot;&gt;
      &lt;div class=&quot;callout-title&quot;&gt;📌 시스템 개선 사례 — E-cart 표준화 (2022)&lt;/div&gt;
      &lt;p&gt;시뮬레이션 중 발견된 &lt;strong&gt;부서 간 응급카트 구성·배치의 비일관성&lt;/strong&gt;이 주요 위험 요인으로 확인됨. 병원 전체 차원에서 &lt;strong&gt;실링 방식, 내부·외부 라벨, 레이아웃, 체크리스트&lt;/strong&gt;를 통일 → 응급 상황에서의 인지 부하(cognitive load) 감소, 즉각적 도구 접근성 확보.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;conclusion&quot; style=&quot;background: var(--teal);&quot;&gt;
    &lt;div class=&quot;conclusion-label&quot;&gt;Conclusion&lt;/div&gt;
    &lt;p&gt;부서 특화 현장 모의 심정지 시뮬레이션은 의료진의 &lt;strong&gt;응급대응 역량&lt;/strong&gt;을 모든 도메인에서 유의하게 향상시켰다(p&amp;lt;0.001). 정기적 현장 시뮬레이션 프로그램의 시행은 &lt;strong&gt;심정지 사건에 대한 소생술 수행능력과 시스템 준비도&lt;/strong&gt;를 강화할 수 있다.&lt;br&gt;&lt;br&gt;본 QI 활동은 2025년부터 SNUH 공식 정규 CPR 교육 프로그램으로 채택되어, &lt;strong&gt;&quot;명확한 프로토콜과 표준화된 하드웨어가 시간을 절약하고, 절약된 시간이 생명을 살린다&quot;&lt;/strong&gt;는 결론을 임상 현장에 정착시켰다.&lt;/p&gt;
  &lt;/div&gt;

  &lt;div class=&quot;qa&quot;&gt;
    &lt;div class=&quot;qa-head&quot;&gt;▎ Q&amp;A · Floor Discussion&lt;/div&gt;
    &lt;div class=&quot;qa-body&quot;&gt;
      &lt;div class=&quot;qa-item&quot;&gt;
        &lt;div class=&quot;qa-q&quot;&gt;&lt;span&gt;주관적 점수(자신감·수행능력) 외에 &lt;strong&gt;실제 환자에서의 CPR time 단축, ROSC 빈도 증가&lt;/strong&gt; 등 객관적 임상 결과 데이터는 있는가? — 좌장 (RRT 디렉터, 한국심폐소생협회 faculty)&lt;/span&gt;&lt;/div&gt;

  &lt;div class=&quot;section-num&quot;&gt;Section 01&lt;/div&gt;
  &lt;h2&gt;IMPACT 컨소시엄 — 5년의 여정&lt;/h2&gt;
  &lt;p&gt;IMPACT 컨소시엄은 2021년 3월 보건복지부 의료데이터 인공지능 R&amp;amp;D 과제로 출범했다. 서울대학교병원이 총괄(주관)을 맡고, &lt;strong&gt;10개 주관기관 + 35개 참여기관&lt;/strong&gt;이 모여 한국형 중환자 빅데이터 시스템(K-MIMIC)과 실제 임상 적용 가능한 AI-CDSS 개발이라는 두 축을 동시에 추진했다.&lt;/p&gt;
  &lt;p&gt;당시 정부 과제의 목표는 기본 데이터 50만 + 확장 데이터 25만이었으나, 컨소시엄은 이를 넘어 &lt;strong&gt;기본 100만, 확장 75만&lt;/strong&gt;이라는 자체 도전 목표를 설정했다. 한 번 모으고 버리는 데이터가 아니라 &lt;strong&gt;축적·재활용 가능한 플랫폼&lt;/strong&gt;을 만드는 것이 핵심 차별화 전략이었다.&lt;/p&gt;
  &lt;p&gt;또 다른 차별점은 연구기관뿐 아니라 &lt;strong&gt;민간 기업이 주관기관으로 참여&lt;/strong&gt;한 구조다. 처음부터 임상 현장에서 실사용 가능한 시스템을 지향했기 때문이다.&lt;/p&gt;

  &lt;div class=&quot;timeline&quot;&gt;
    &lt;div class=&quot;timeline-header&quot;&gt;⏱ Project Timeline (2021–2026)&lt;/div&gt;
    &lt;div class=&quot;timeline-body&quot;&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot;&gt;2021&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;Project Kick-off&lt;/strong&gt;
          의료데이터 인공지능 R&amp;amp;D 과제 시작 · 25개 병원 데이터 수집 시작 (3차 11개 + 종합 14개)
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot;&gt;2023&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;Phase 1 종료&lt;/strong&gt;
          기본 545K · 확장 325K · 33개 CDSS 모델 개발 완료
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot;&gt;2024&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;Korea Clinical Datathon 2024&lt;/strong&gt;
          알파 → 베타1 버전 공개 · 외부 연구팀 활용 시작
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot;&gt;2025&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;Korea Clinical Datathon 2025 + 미국 SCCM Data Forum 발표&lt;/strong&gt;
          베타2 버전 공개 · 국제 학회 데이터 포럼 발표 · 중환자의학회지 논문 게재
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot;&gt;2026+&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;KHDP 통합 단계&lt;/strong&gt;
          K-MIMIC 데이터셋의 한국 헬스데이터 플랫폼(KHDP) 통합 작업 진행
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- SECTION 3 --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-num&quot;&gt;Section 03&lt;/div&gt;
  &lt;h2&gt;플랫폼 구조 — 수집부터 활용까지&lt;/h2&gt;
  &lt;p&gt;IMPACT 플랫폼은 &lt;strong&gt;수집 → 가명화/익명화 → 전송 → 활용&lt;/strong&gt;의 4단계 파이프라인으로 설계됐다. OMOP-CDM 기반의 표준 데이터 모델을 채택하면서도, OMOP에 탑재되지 않은 &lt;strong&gt;리폼 데이터·영상 데이터&lt;/strong&gt;까지 적극 수집해 자체 표준화를 시도했다.&lt;/p&gt;

  &lt;div class=&quot;timeline&quot;&gt;
    &lt;div class=&quot;timeline-header&quot;&gt;📐 Platform Architecture&lt;/div&gt;
    &lt;div class=&quot;timeline-body&quot;&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px; line-height:1.3;&quot;&gt;STEP 1&lt;br&gt;수집&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;Institutional Network 내 데이터 수집&lt;/strong&gt;
          각 병원 EMR에서 임상 정보, 활력징후, 영상, 생체신호를 다층 수집. 진단·검사·처방·간호기록까지 포함.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px; line-height:1.3;&quot;&gt;STEP 2&lt;br&gt;가명화&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;Rule-Based + 자동화 De-identification&lt;/strong&gt;
          간호 기록 같은 자연어 데이터의 가명화가 핵심 난제. &lt;em&gt;&quot;옆 침상에서 사이드 적용을 했다&quot;&lt;/em&gt;처럼 다른 표현이 같은 의미인지를 인식하는 NLP 기반 처리가 필요했다. 가능한 부분은 자동화, 보호 영역은 관찰(observation) 데이터 링크 기반 wrapping으로 처리.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px; line-height:1.3;&quot;&gt;STEP 3&lt;br&gt;전송&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;DMZ Server 경유 → IRB/DRB 승인 기반 제공&lt;/strong&gt;
          국내 개인정보 규정상 실시간 전송이 어려워 시차 발생. 영상·바이오시그널은 처리가 상대적으로 용이하여 더 빠르게 축적.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px; line-height:1.3;&quot;&gt;STEP 4&lt;br&gt;활용&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;알파 → 베타1 → 베타2 (Korea Clinical Datathon)&lt;/strong&gt;
          외부 연구팀에게 신청 기반 접근 제공. 2024·2025년 데이터톤에서 다수 팀이 참여하며 활용 사례 축적.
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;callout&quot;&gt;
    &lt;div class=&quot;callout-title&quot;&gt;📌 가명화의 어려움 — Why It Matters&lt;/div&gt;
    &lt;p&gt;구조화된 lab/처방 데이터는 비교적 단순. 그러나 자유 텍스트로 작성된 &lt;strong&gt;간호 기록&lt;/strong&gt;은 동일한 임상 상황을 다양한 표현으로 기술하기 때문에 단순 마스킹으로 해결되지 않는다. Rule-base를 자동화하고, 수동 검수 모듈과 결합하는 하이브리드 접근이 필요했다. 관련 방법론은 학회 발표 후 논문화 진행 중.&lt;/p&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- SECTION 4 --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-num&quot;&gt;Section 04&lt;/div&gt;
  &lt;h2&gt;3대 도전 — 왜 Go-Live가 늦어졌나&lt;/h2&gt;
  &lt;p&gt;당초 2024년 일반 공개(Go-Live)를 목표로 했으나, 국내 의료 빅데이터 운영의 구조적 한계 때문에 지연됐다. 강의에서는 세 가지 핵심 난제를 제시했다.&lt;/p&gt;

  &lt;div class=&quot;challenge-list&quot;&gt;
    &lt;div class=&quot;challenge&quot;&gt;
      &lt;div class=&quot;challenge-num&quot;&gt;1&lt;/div&gt;
      &lt;div class=&quot;challenge-text&quot;&gt;
        &lt;strong&gt;가명화 인정의 한계&lt;/strong&gt;
        &lt;p&gt;가명화 데이터는 국내 활용은 가능하나 &lt;strong&gt;해외 연구자 접근이 불가&lt;/strong&gt;. MIT PhysioNet의 MIMIC은 글로벌 활용을 전제로 익명화 인정 절차가 잘 갖춰져 있으나, 국내에는 이에 상응하는 제도가 부재했다.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;challenge&quot;&gt;
      &lt;div class=&quot;challenge-num&quot;&gt;2&lt;/div&gt;
      &lt;div class=&quot;challenge-text&quot;&gt;
        &lt;strong&gt;플랫폼 운영 주체 부재&lt;/strong&gt;
        &lt;p&gt;플랫폼을 만들어도 &quot;누가 접근을 허용할 수 있는가&quot; &quot;누가 가명화를 인정할 수 있는가&quot;의 책임 주체가 모호. 비영리재단 설립·KODA 위탁(KMS DB 사례)·상업화 등 모든 옵션을 법률 자문까지 받아 검토했으나 단일 해법 부재.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;challenge&quot;&gt;
      &lt;div class=&quot;challenge-num&quot;&gt;3&lt;/div&gt;
      &lt;div class=&quot;challenge-text&quot;&gt;
        &lt;strong&gt;장기 펀딩과 존속성&lt;/strong&gt;
        &lt;p&gt;R&amp;amp;D 과제 종료 후 자립 운영을 위한 비즈니스 모델이 핵심 난제. AI-CDSS 사업화 + AI-CRO 서비스 + 오픈데이터셋 확장의 3축 전략으로 자립을 시도했으나 단독으로는 충분치 않았다.&lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- SECTION 5 --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-num&quot;&gt;Section 05&lt;/div&gt;
  &lt;h2&gt;NEXT Phase — KHDP 통합으로의 전환&lt;/h2&gt;
  &lt;p&gt;2024년 출범한 &lt;strong&gt;국가전략기술 특활구역(데이터 규제 특례)&lt;/strong&gt;은 외국인 활용 허용과 가명화 인정 등에서 기존 규정의 한계를 우회할 수 있는 제도적 돌파구를 제공했다. 이를 기반으로 한 &lt;strong&gt;KHDP(Korea Health Data Platform)&lt;/strong&gt;로의 통합이 IMPACT의 다음 단계가 됐다.&lt;/p&gt;

  &lt;div class=&quot;timeline&quot;&gt;
    &lt;div class=&quot;timeline-header&quot;&gt;🚀 NEXT Phase Roadmap&lt;/div&gt;
    &lt;div class=&quot;timeline-body&quot;&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px;&quot;&gt;PHASE A&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;SNUH 데이터 KHDP 탑재 완료&lt;/strong&gt;
          서울대학교병원의 K-MIMIC 데이터는 이미 KHDP에 탑재되어 활용 가능 상태. 관심 연구자는 KHDP 접속 후 신청 가능.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px;&quot;&gt;PHASE B&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;타 컨소시엄 기관 데이터 통합 작업 진행&lt;/strong&gt;
          나머지 24개 참여 병원 데이터의 KHDP 통합 작업 순차 진행 중.
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;tl-item&quot;&gt;
        &lt;div class=&quot;tl-year&quot; style=&quot;font-size:13px;&quot;&gt;PHASE C&lt;/div&gt;
        &lt;div class=&quot;tl-text&quot;&gt;
          &lt;strong&gt;국제 협력 + 연구 친화적 운영구조&lt;/strong&gt;

    &lt;p&gt;MIMIC은 &lt;strong&gt;단일 기관(MIT BIH/BIDMC) + 미국 IRB 인정 익명화 + 글로벌 학습용 공개&lt;/strong&gt;가 처음부터 설계된 모델. IMPACT는 &lt;strong&gt;다기관 + 한국 가명화 규제 + 산업·임상 활용&lt;/strong&gt;을 함께 노린 구조라 출발선이 다르다. KHDP 통합으로 IMPACT는 비로소 MIMIC형 글로벌 활용 구조에 근접한다.&lt;/p&gt;
